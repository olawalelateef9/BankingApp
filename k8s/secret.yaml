apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: banking
type: Opaque
stringData:
  # Updated to match your docker-compose exactly
  postgres-user: "bankuser"
  postgres-password: "bankpass" 
  # Updated the connection string to use the correct user/pass
  database-url: "postgresql://bankuser:bankpass@postgres-service:5432/bankingdb"