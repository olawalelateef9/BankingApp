apiVersion: v1
kind: Service
metadata:
  name: frontend-external
  namespace: banking
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: user-service-external
  namespace: banking
spec:
  type: LoadBalancer
  selector:
    app: user-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: activity-service-external
  namespace: banking
spec:
  type: LoadBalancer
  selector:
    app: activity-service
  ports:
    - name: http
      port: 8001      # This matches what your frontend is looking for
      targetPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: transaction-service-external
  namespace: banking
spec:
  type: LoadBalancer
  selector:
    app: transaction-service
  ports:
    - name: http
      port: 8080      # This matches what your frontend is looking for
      targetPort: 8080