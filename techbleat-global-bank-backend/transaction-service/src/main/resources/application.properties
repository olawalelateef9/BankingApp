spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=${SERVER_PORT:8080}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
frontend.origin=${FRONTEND_ORIGIN:http://localhost:3000}
# Expose the Prometheus metrics endpoint
management.endpoints.web.exposure.include=health,info,prometheus
# Enable standard metrics
management.metrics.export.prometheus.enabled=true
# Optional: Add a tag so you can filter by "transaction-service" in Grafana
management.observations.key-values.application=transaction-service
