apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: banking-system
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/olawalelateef9/BankingApp.git'
    targetRevision: HEAD
    path: k8s # This tells ArgoCD to look inside your k8s folder
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: banking
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true